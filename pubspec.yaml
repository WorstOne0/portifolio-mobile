name: portifolio_mobile
description: "Lucca Gabriel's portfolio mobile app."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1
  flutter_animate: ^4.5.0
  font_awesome_flutter: ^10.8.0
  go_router: ^14.0.0
  simple_icons: ^14.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: true
  image_path_android: "assets/images/logo2.png"
  adaptive_icon_background: "#0B5ECD"
  ios: true
  image_path_ios: "assets/images/logo2.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
